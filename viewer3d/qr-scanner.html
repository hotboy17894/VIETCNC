<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quét QR Code - 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        #video {
            width: 100%;
            height: auto;
            display: block;
        }
        #canvas {
            display: none;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #00ff00;
            box-shadow: 0 0 10px #00ff00;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        #result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            background: #f8f9fa;
            color: #666;
            font-size: 14px;
        }
        .camera-select {
            margin: 15px 0;
        }
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            width: 100%;
            max-width: 300px;
        }
        .instructions {
            text-align: left;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
        .instructions h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .instructions ul {
            margin-left: 20px;
        }
        .instructions li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Quét QR Code</h1>
        <p class="subtitle">Hướng camera vào mã QR để xem 3D model</p>
        

        
        <div id="video-container" style="display:none;">
            <video id="video" autoplay playsinline></video>
            <div class="scan-line"></div>
        </div>
        
        <canvas id="canvas"></canvas>
        
        <div class="status" id="status">
            Nhấn "Bắt đầu quét" để mở camera
        </div>
        
        <div>
            <button class="btn" id="startBtn" onclick="startScanning()">📷 Bắt đầu quét</button>
            <button class="btn" id="stopBtn" onclick="stopScanning()" style="display:none;">⏹️ Dừng</button>
        </div>
        
        <div id="result"></div>
        
        <div class="instructions">
            <h3>📋 Hướng dẫn:</h3>
            <ul>
                <li>Cho phép truy cập camera khi trình duyệt hỏi</li>
                <li>Hướng camera vào mã QR</li>
                <li>Giữ camera ổn định cho đến khi quét thành công</li>
                <li>Tự động chuyển đến trang xem 3D sau khi quét</li>
            </ul>
        </div>
    </div>

    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let scanning = false;
        let stream = null;

        async function startScanning() {
            try {
                updateStatus('Đang yêu cầu quyền camera...', 'info');
                
                // Yêu cầu quyền truy cập camera (LUÔN hỏi user)
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    document.getElementById('video-container').style.display = 'block';
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('stopBtn').style.display = 'inline-block';
                    
                    scanning = true;
                    updateStatus('Đang quét... Hướng camera vào mã QR', 'info');
                    requestAnimationFrame(scan);
                };
                
            } catch (err) {
                console.error('Lỗi mở camera:', err);
                updateStatus('Không thể mở camera! Vui lòng cho phép truy cập camera.', 'error');
            }
        }

        function stopScanning() {
            scanning = false;
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            video.srcObject = null;
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            
            updateStatus('Đã dừng quét', 'info');
        }

        function scan() {
            if (!scanning) return;
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                
                if (code) {
                    handleQRCode(code.data);
                    return;
                }
            }
            
            requestAnimationFrame(scan);
        }

        function handleQRCode(data) {
            console.log('QR Code detected:', data);
            
            // Dừng quét
            stopScanning();
            
            // Kiểm tra loại QR và xử lý
            // 1. URL viewer đầy đủ
            if (data.includes('viewer.html') || data.includes('viewer3d')) {
                updateStatus('✅ Quét thành công! Đang mở 3D viewer...', 'success');
                setTimeout(() => {
                    window.location.href = data;
                }, 1000);
            }
            // 2. Model ID (MODEL_xxx)
            else if (data.startsWith('MODEL_')) {
                updateStatus('✅ Quét thành công! Đang mở model...', 'success');
                setTimeout(() => {
                    window.location.href = `viewer.html?id=${data}`;
                }, 1000);
            }
            // 3. URL khác
            else if (data.startsWith('http://') || data.startsWith('https://')) {
                updateStatus('✅ Quét thành công!\n\nURL: ' + data, 'success');
                if (confirm('Mở link này trong tab mới?\n\n' + data)) {
                    window.open(data, '_blank');
                }
            }
            // 4. Nội dung text/số bất kỳ
            else {
                showQRContent(data);
            }
        }

        function showQRContent(content) {
            updateStatus('✅ Quét thành công!', 'success');
            
            const resultDiv = document.getElementById('result');
            resultDiv.className = 'success';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <h3 style="margin-bottom: 10px;">📋 Nội dung QR Code:</h3>
                <div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0; word-break: break-all; text-align: left;">
                    <code style="font-size: 14px;">${escapeHtml(content)}</code>
                </div>
                <button class="btn" onclick="copyToClipboard('${escapeHtml(content)}')">📋 Copy</button>
                <button class="btn" onclick="location.reload()">🔄 Quét lại</button>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Đã copy vào clipboard!');
            }).catch(err => {
                console.error('Lỗi copy:', err);
                alert('❌ Không thể copy. Vui lòng copy thủ công.');
            });
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status';
            
            if (type === 'error') {
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
            } else if (type === 'success') {
                status.style.background = '#d4edda';
                status.style.color = '#155724';
            } else {
                status.style.background = '#f8f9fa';
                status.style.color = '#666';
            }
        }

        // Kiểm tra hỗ trợ camera
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            updateStatus('Trình duyệt không hỗ trợ camera!', 'error');
            document.getElementById('startBtn').disabled = true;
        }

        // Dừng camera khi đóng trang
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
