<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchUp 3D Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
        }
        .models {
            display: grid;
            gap: 15px;
        }
        .model-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        .model-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: left 0.5s;
        }
        .model-card:hover::before {
            left: 100%;
        }
        .model-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .model-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            font-size: 18px;
        }
        .model-code {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .model-info {
            display: flex;
            gap: 15px;
            font-size: 13px;
            color: #666;
        }
        .model-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .badge {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 SketchUp 3D Viewer</h1>
        <p class="subtitle">Quét QR hoặc chọn sản phẩm để xem mô hình 3D</p>
        
        <div class="models" id="modelsList">
            <!-- Models sẽ được load từ JSON -->
        </div>
        
        <footer>
            Powered by GitHub Pages | Free Forever
        </footer>
    </div>

    <script>
        async function loadModels() {
            try {
                const response = await fetch('./api/models.json');
                const models = await response.json();
                
                const container = document.getElementById('modelsList');
                container.innerHTML = '';
                
                Object.values(models).forEach(model => {
                    const card = document.createElement('div');
                    card.className = 'model-card';
                    card.onclick = () => viewModel(model.id);
                    
                    const partsCount = model.parts ? model.parts.length : 0;
                    
                    card.innerHTML = `
                        <div class="model-name">${model.name}</div>
                        <div class="model-code">${model.code}</div>
                        <div class="model-info">
                            <span>📐 ${model.size || 'N/A'}</span>
                            <span>🔧 ${partsCount} chi tiết</span>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
                
            } catch (error) {
                console.error('Lỗi load models:', error);
                document.getElementById('modelsList').innerHTML = 
                    '<p style="text-align:center;color:#999;">Chưa có sản phẩm nào</p>';
            }
        }
        
        function viewModel(id) {
            window.location.href = `viewer.html?id=${id}`;
        }
        
        // Load models khi trang load
        loadModels();
    </script>
</body>
</html>
